<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wania Khalid | Business Card</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="card">
        <div class="strip">
            <span class="strip-role">Software Engineer</span>

        </div>
        <div class="body">

                <img src="image/wania_faces.webp"

            <div class="divider"></div>
            <div class="info-col">
                <h1>Wania Khalid</h1>
                <p class="subtitle">Software Engineer • AI Enthusiast</p>
                <ul class="fields">
                    <li>
                        <i class="fa-solid fa-phone"></i>
                        <span>0331-XXXXXXX</span>
                    </li>
                    <li>
                        <i class="fa-solid fa-envelope"></i>
                        <span>waniakhalid906.com</span>
                    </li>
                    <li>
                        <i class="fa-brands fa-github"></i>
                        <a href="https://github.com/Wania-Khalid"
                            target="_blank">
                            GitHub
                        </a>
                    </li>
                    <li>
                        <i class="fa-brands fa-linkedin"></i>
                        <a href="https://www.linkedin.com/in/wania-khalid-00a5253b2"
                            target="_blank">
                            LinkedIn
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
